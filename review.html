<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قيّم تجربتك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:linear-gradient(160deg,#0B1F4E 0%,#1A3A8F 65%,#0d2660 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl;padding:20px;}
.box{background:#fff;border-radius:28px;padding:44px 32px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,.45);text-align:center;}
.brand{font-family:'Tajawal',sans-serif;font-size:28px;font-weight:900;direction:ltr;display:inline-block;margin-bottom:20px;}
.b5{background:linear-gradient(180deg,#FFF0A0,#F5B429,#8A5500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:italic;}
.bt{color:#0B1F4E;}
.bname{font-size:24px;font-weight:900;color:#0B1F4E;margin-bottom:6px;}
.bsub{font-size:14px;color:#64748B;margin-bottom:36px;}
.stars{font-size:44px;letter-spacing:3px;margin-bottom:24px;}
.q{font-family:'Tajawal',sans-serif;font-size:22px;font-weight:900;color:#0B1F4E;margin-bottom:28px;}
.btns{display:flex;flex-direction:column;gap:14px;}
.fbtn{padding:20px;border-radius:18px;font-family:'Cairo',sans-serif;font-size:18px;font-weight:900;cursor:pointer;border:none;transition:all .2s;}
.fbtn.h{background:linear-gradient(135deg,#F5B429,#D4920A);color:#0B1F4E;box-shadow:0 8px 28px rgba(212,146,10,.4);}
.fbtn.s{background:#F1F5F9;color:#475569;border:2px solid #E2E8F0;}
.result{display:none;animation:fi .35s ease;}
@keyframes fi{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.r-icon{font-size:80px;margin-bottom:18px;}
.r-title{font-family:'Tajawal',sans-serif;font-size:26px;font-weight:900;color:#0B1F4E;margin-bottom:10px;}
.r-sub{font-size:14px;color:#64748B;line-height:1.8;margin-bottom:28px;}
.r-btn{display:block;width:100%;padding:17px;border-radius:16px;font-family:'Cairo',sans-serif;font-size:16px;font-weight:900;text-decoration:none;transition:all .2s;margin-bottom:12px;}
.r-btn.google{background:linear-gradient(135deg,#F5B429,#D4920A);color:#0B1F4E;box-shadow:0 8px 28px rgba(212,146,10,.4);}
.r-btn.wa{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;box-shadow:0 8px 28px rgba(37,211,102,.35);}
.spin-wrap{padding:30px;}
.spin{display:inline-block;width:28px;height:28px;border:3px solid rgba(11,31,78,.1);border-top-color:#2251D3;border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.err-msg{color:#DC2626;font-size:13px;background:#FEF2F2;border-radius:12px;padding:20px;line-height:1.8;}
</style>
</head>
<body>
<div class="box">
  <div id="s-load" class="spin-wrap"><div class="spin"></div></div>
  <div id="s-err" style="display:none" class="err-msg">❌ رابط غير صحيح</div>

  <div id="s-survey" style="display:none">
    <div class="brand"><span class="b5">5</span><span class="bt">tars</span></div>
    <div class="bname" id="biz-name">محلك</div>
    <div class="bsub" id="biz-sub">نسعد بخدمتك</div>
    <div class="stars">⭐⭐⭐⭐⭐</div>
    <div class="q">كيف كانت تجربتك معنا؟</div>
    <div class="btns">
      <button class="fbtn h" onclick="choose('happy')">😊&nbsp; ممتازة — أريد مشاركة تقييمي!</button>
      <button class="fbtn s" onclick="choose('sad')">😞&nbsp; أقل من المتوقع</button>
    </div>
  </div>

  <div id="s-happy" class="result">
    <div class="r-icon">🌟</div>
    <div class="r-title">رائع! يسعدنا سماع ذلك</div>
    <div class="r-sub">تقييمك على Google يساعد الجميع ويشجّعنا على الاستمرار 🙏</div>
    <a id="google-link" href="#" class="r-btn google" target="_blank" rel="noopener">⭐ اكتب تقييمك على Google الآن</a>
  </div>

  <div id="s-sad" class="result">
    <div class="r-icon">💙</div>
    <div class="r-title">نأسف لذلك!</div>
    <div class="r-sub" id="neg-msg">آسفون على تجربتك! تواصل معنا مباشرة وسنعوضك فوراً 💚</div>
    <a id="wa-link" href="#" class="r-btn wa" target="_blank" rel="noopener">📱 تواصل معنا على واتساب</a>
  </div>
</div>

<script>
var SB_URL = 'https://bxlvcdfqpkxyrqjdnchi.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4bHZjZGZxcGt4eXJxamRuY2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1Nzk1MTgsImV4cCI6MjA5MTE1NTUxOH0.sG1TRiia7E6DGAUHLNAakjiLRu3lopDfRNcMB-0kV3U';
var sb = supabase.createClient(SB_URL, SB_KEY);
var _route = null;
var _legacyUid = null;

function show(id) {
  ['s-load','s-err','s-survey','s-happy','s-sad'].forEach(function(x){
    document.getElementById(x).style.display = (x===id)?'block':'none';
  });
}

function normalizeWhatsappUrl(raw) {
  var digits = String(raw || '').replace(/\D/g,'');
  if (!digits) return '';
  if (digits.startsWith('966')) return 'https://wa.me/' + digits;
  if (digits.startsWith('05') && digits.length === 10) return 'https://wa.me/966' + digits.slice(1);
  if (digits.startsWith('5') && digits.length === 9) return 'https://wa.me/966' + digits;
  return 'https://wa.me/' + digits;
}

async function loadRoute() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('t');
  _legacyUid = params.get('uid') || params.get('bid');

  try {
    var query = sb.from('review_links').select('token,user_id,business_name,google_review_url,whatsapp_url,negative_message,active');
    if (token) query = query.eq('token', token);
    else if (_legacyUid) query = query.eq('user_id', _legacyUid);
    else return null;

    var result = await query.eq('active', true).maybeSingle();
    return result.data || null;
  } catch (e) {
    return null;
  }
}

async function init() {
  _route = await loadRoute();
  if (!_route) {
    document.getElementById('s-err').textContent = '❌ هذا الرابط غير صالح أو يحتاج إعادة توليد QR من لوحة التحكم';
    show('s-err');
    return;
  }

  var bizName = _route.business_name || 'محلك';
  var googleUrl = _route.google_review_url || 'https://maps.google.com';
  var whatsappUrl = normalizeWhatsappUrl(_route.whatsapp_url);
  var negativeMessage = _route.negative_message || 'آسفون على تجربتك! تواصل معنا مباشرة وسنعوضك فوراً 💚';

  document.getElementById('biz-name').textContent = bizName;
  document.getElementById('biz-sub').textContent = 'نسعد بخدمتك في ' + bizName;
  document.getElementById('neg-msg').textContent = negativeMessage;
  document.getElementById('google-link').href = googleUrl;
  document.getElementById('wa-link').href = whatsappUrl || 'https://wa.me/';
  document.title = 'قيّم ' + bizName;

  if (!whatsappUrl) {
    document.getElementById('wa-link').style.opacity = '.6';
    document.getElementById('wa-link').style.pointerEvents = 'none';
  }

  show('s-survey');
  track('scan');
}

async function track(type) {
  try {
    await fetch('/api/track-click', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        token: _route?.token || null,
        userId: _route?.user_id || _legacyUid || null,
        type: type
      })
    });
  } catch(e) {}
}

async function choose(type) {
  if (!_route) return;
  var stateId = type === 'happy' ? 's-happy' : 's-sad';
  show(stateId);

  if (type === 'happy') {
    track('positive_click');
    setTimeout(function(){
      track('google_redirect');
      window.open(_route.google_review_url || 'https://maps.google.com', '_blank', 'noopener');
    }, 700);
    return;
  }

  track('negative_click');
  if (_route.whatsapp_url) {
    setTimeout(function(){ track('whatsapp_redirect'); }, 700);
  }
}

init();
</script>
</body>
</html>
