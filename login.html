<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5tars — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<script src="/env.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/core.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#0B1F4E 0%,#1A3A8F 60%,#0d2660 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl;}
.card{background:#fff;border-radius:24px;padding:40px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,0.35);}
.logo{text-align:center;margin-bottom:28px;}
.logo-txt{font-family:'Tajawal',sans-serif;font-size:36px;font-weight:900;direction:ltr;display:inline-block;}
.logo-5{background:linear-gradient(180deg,#FFF0A0,#F5B429,#8A5500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:italic;}
.logo-t{color:#0B1F4E;}
.logo-sub{font-size:11px;letter-spacing:4px;color:#F5B429;display:block;margin-top:2px;}
h2{font-size:20px;font-weight:900;color:#0B1F4E;text-align:center;margin-bottom:24px;}
.field{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:700;color:#3B5080;margin-bottom:6px;}
input{width:100%;padding:13px 16px;border:1.5px solid #E2E8F0;border-radius:12px;font-family:'Cairo',sans-serif;font-size:14px;color:#0B1F4E;outline:none;transition:border-color .2s;}
input:focus{border-color:#2251D3;box-shadow:0 0 0 3px rgba(34,81,211,.08);}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#2251D3,#1A3A8F);color:#fff;border:none;border-radius:12px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:900;cursor:pointer;transition:all .2s;margin-top:4px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(34,81,211,.35);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.btn-google{background:#fff;border:1.5px solid #E2E8F0;color:#3B5080;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px;}
.btn-google:hover{border-color:#2251D3;color:#2251D3;box-shadow:none;transform:none;}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:#94A3B8;font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#E2E8F0;}
.err{background:#FEF2F2;border:1px solid rgba(220,38,38,.2);color:#DC2626;border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:12px;display:none;}
.err.show{display:block;}
.link{text-align:center;margin-top:20px;font-size:13px;color:#64748B;}
.link a{color:#2251D3;font-weight:700;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-txt"><span class="logo-5">5</span><span class="logo-t">tars</span></div>
    <span class="logo-sub">★★★★★</span>
  </div>
  <h2>أهلاً بعودتك 👋</h2>
  <div class="err" id="err"></div>
  <button class="btn btn-google" onclick="loginGoogle()">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    الدخول بحساب Google
  </button>
  <div class="divider">أو بالإيميل</div>
  <div class="field"><label>البريد الإلكتروني</label><input type="email" id="email" placeholder="you@example.com"></div>
  <div class="field"><label>كلمة المرور</label><input type="password" id="pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"></div>
  <button class="btn" id="loginBtn" onclick="login()">دخول ←</button>
  <div class="link">ما عندك حساب؟ <a href="/signup.html">سجّل مجاناً</a> &nbsp;·&nbsp; <a href="/reset.html">نسيت كلمة المرور؟</a></div>
</div>
<script>
async function login() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const err   = document.getElementById('err');
  const btn   = document.getElementById('loginBtn');
  err.classList.remove('show');
  if (!email || !pass) { err.textContent='أدخل الإيميل وكلمة المرور'; err.classList.add('show'); return; }
  btn.disabled = true; btn.textContent = '⏳ جاري الدخول...';
  const sb = FIVE.getSB();
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { err.textContent = error.message; err.classList.add('show'); btn.disabled=false; btn.textContent='دخول ←'; return; }
  window.location.href = '/dashboard.html';
}
async function loginGoogle() {
  const sb = FIVE.getSB();
  await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/dashboard.html' } });
}
// redirect if already logged in
FIVE.getSB().auth.getSession().then(({data:{session}}) => { if(session) window.location.href='/dashboard.html'; });
</script>
</body>
</html>
