<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5tars — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#0B1F4E 0%,#1A3A8F 60%,#0d2660 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl;padding:20px;}
.card{background:#fff;border-radius:24px;padding:40px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,0.35);}
.logo{text-align:center;margin-bottom:28px;}
.logo a{text-decoration:none;display:inline-block;}
.logo-txt{font-family:'Tajawal',sans-serif;font-size:38px;font-weight:900;direction:ltr;display:inline-block;}
.l5{background:linear-gradient(180deg,#FFF0A0,#F5B429,#8A5500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:italic;}
.lt{color:#0B1F4E;}
.logo-sub{font-size:11px;letter-spacing:4px;color:#F5B429;display:block;margin-top:2px;}
h2{font-size:20px;font-weight:900;color:#0B1F4E;text-align:center;margin-bottom:24px;}
.field{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:700;color:#3B5080;margin-bottom:6px;}
input{width:100%;padding:13px 16px;border:1.5px solid #E2E8F0;border-radius:12px;font-family:'Cairo',sans-serif;font-size:14px;color:#0B1F4E;outline:none;transition:border-color .2s;background:#fff;}
input:focus{border-color:#2251D3;box-shadow:0 0 0 3px rgba(34,81,211,.08);}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#2251D3,#1A3A8F);color:#fff;border:none;border-radius:12px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:900;cursor:pointer;transition:all .2s;margin-top:4px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(34,81,211,.35);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none;}
.err{background:#FEF2F2;border:1px solid rgba(220,38,38,.2);color:#DC2626;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
.err.show{display:block;}
.link{text-align:center;margin-top:20px;font-size:13px;color:#64748B;}
.link a{color:#2251D3;font-weight:700;text-decoration:none;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:6px;}
.btn-google{width:100%;padding:13px;background:#fff;color:#3c4043;border:1.5px solid #E2E8F0;border-radius:12px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-google:hover{background:#F8FAFF;border-color:#2251D3;box-shadow:0 4px 16px rgba(34,81,211,.1);}
.btn-google:disabled{opacity:.6;cursor:not-allowed;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <a href="/">
      <div class="logo-txt"><span class="l5">5</span><span class="lt">tars</span></div>
      <span class="logo-sub">★★★★★</span>
    </a>
  </div>
  <h2>أهلاً بعودتك 👋</h2>
  <div class="err" id="err"></div>
  <div class="field">
    <label>البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>
  <div class="field">
    <label>كلمة المرور</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="btn" id="btn" onclick="doLogin()">دخول ←</button>
  <div style="display:flex;align-items:center;gap:10px;margin:16px 0;">
    <div style="flex:1;height:1px;background:#E2E8F0;"></div>
    <span style="font-size:11px;color:#94A3B8;white-space:nowrap;">أو</span>
    <div style="flex:1;height:1px;background:#E2E8F0;"></div>
  </div>
  <button class="btn-google" id="btn-google" onclick="loginWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 48 48" style="flex-shrink:0"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    الدخول بحساب Google
  </button>
  <div class="link" style="margin-top:16px">
    ما عندك حساب؟ <a href="/signup.html">سجّل مجاناً — 14 يوم</a>
  </div>
</div>
<script>
const sb = supabase.createClient('https://bxlvcdfqpkxyrqjdnchi.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4bHZjZGZxcGt4eXJxamRuY2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1Nzk1MTgsImV4cCI6MjA5MTE1NTUxOH0.sG1TRiia7E6DGAUHLNAakjiLRu3lopDfRNcMB-0kV3U');
sb.auth.getSession().then(function(r){if(r.data&&r.data.session)window.location.href='/dashboard.html';});
async function loginWithGoogle(){const btn=document.getElementById('btn-google');btn.disabled=true;btn.innerHTML='<span style="display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:#2251D3;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:6px;"></span> جاري التوجيه...';await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+'/dashboard.html'}});}
async function doLogin(){var email=document.getElementById('email').value.trim();var pass=document.getElementById('pass').value;var err=document.getElementById('err');var btn=document.getElementById('btn');err.className='err';if(!email||!pass){err.textContent='أدخل الإيميل وكلمة المرور';err.className='err show';return;}btn.disabled=true;btn.innerHTML='جاري الدخول... <span class="spinner"></span>';var result=await sb.auth.signInWithPassword({email:email,password:pass});if(result.error){var msgs={'Invalid login credentials':'الإيميل أو كلمة المرور غير صحيحة','Email not confirmed':'يرجى تأكيد البريد الإلكتروني','Too many requests':'حاولت كثيراً، انتظر قليلاً'};err.textContent=msgs[result.error.message]||result.error.message;err.className='err show';btn.disabled=false;btn.textContent='دخول ←';return;}window.location.href='/dashboard.html';}
</script>
</body>
</html>
