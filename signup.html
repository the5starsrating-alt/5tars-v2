<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5tars — إنشاء حساب</title>
<meta name="description" content="أنشئ حسابك على 5tars وابدأ تجربتك المجانية 14 يوم بدون بطاقة ائتمان.">
<meta name="robots" content="noindex, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#0B1F4E 0%,#1A3A8F 60%,#0d2660 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl;padding:20px}
.card{background:#fff;border-radius:24px;padding:36px;width:100%;max-width:460px;box-shadow:0 32px 80px rgba(0,0,0,.35)}
.logo{text-align:center;margin-bottom:6px}
.logo a{text-decoration:none;display:inline-block}
.logo-txt{font-family:'Tajawal',sans-serif;font-size:36px;font-weight:900;direction:ltr;display:inline-block}
.l5{background:linear-gradient(180deg,#FFF0A0,#F5B429,#8A5500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:italic}
.lt{color:#0B1F4E}
.badge{display:inline-flex;align-items:center;gap:6px;background:#EEF3FF;color:#2251D3;border:1px solid rgba(34,81,211,.2);font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:16px}
h2{font-size:20px;font-weight:900;color:#0B1F4E;text-align:center;margin-bottom:20px}
.benefits{background:#F0FDF4;border:1px solid rgba(22,163,74,.15);border-radius:10px;padding:12px 16px;margin-bottom:18px}
.ben{font-size:12.5px;color:#166534;margin-bottom:5px}
.ben:last-child{margin-bottom:0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{margin-bottom:13px}
label{display:block;font-size:12.5px;font-weight:700;color:#3B5080;margin-bottom:5px}
input,select{width:100%;padding:12px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-family:'Cairo',sans-serif;font-size:14px;color:#0B1F4E;outline:none;transition:border-color .2s;background:#fff;min-height:44px}
input:focus,select:focus{border-color:#2251D3;box-shadow:0 0 0 3px rgba(34,81,211,.07)}
input.invalid{border-color:#DC2626;box-shadow:0 0 0 3px rgba(220,38,38,.07)}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#F5B429,#D4920A);color:#0B1F4E;border:none;border-radius:12px;font-family:'Cairo',sans-serif;font-size:14.5px;font-weight:900;cursor:pointer;transition:all .2s;margin-top:4px;min-height:48px}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(212,146,10,.4)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
.err{background:#FEF2F2;border:1px solid rgba(220,38,38,.2);color:#DC2626;border-radius:8px;padding:10px 14px;font-size:12.5px;margin-bottom:12px;display:none;line-height:1.6}
.err.show{display:block}
.err a{color:#DC2626;font-weight:800;text-decoration:underline}
.link{text-align:center;margin-top:16px;font-size:13.5px;color:#64748B}
.link a{color:#2251D3;font-weight:700;text-decoration:none}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(11,31,78,.2);border-top-color:#0B1F4E;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-google{width:100%;padding:13px;background:#fff;color:#3c4043;border:1.5px solid #E2E8F0;border-radius:12px;font-family:'Cairo',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:4px;min-height:46px}
.btn-google:hover{background:#F8FAFF;border-color:#2251D3}
.btn-google:disabled{opacity:.6;cursor:not-allowed}
.pwd-hint{font-size:11.5px;color:#94A3B8;margin-top:4px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <a href="/">
      <div class="logo-txt"><span class="l5">5</span><span class="lt">tars</span></div>
    </a>
  </div>
  <div style="text-align:center;margin-bottom:14px"><span class="badge">🎁 14 يوم مجاناً — بدون بطاقة</span></div>
  <h2>أنشئ حسابك الآن</h2>
  <div class="benefits">
    <div class="ben">✅ تنبيهات واتساب فورية عند كل تقييم</div>
    <div class="ben">✅ ردود ذكية بالعربي بضغطة واحدة</div>
    <div class="ben">✅ QR Code ذكي لمشروعك فوراً</div>
  </div>
  <div class="err" id="err"></div>
  <div class="grid2">
    <div class="field"><label for="name">الاسم الكامل</label><input type="text" id="name" placeholder="محمد العمري" autocomplete="name" required></div>
    <div class="field"><label for="phone">رقم الواتساب</label><input type="tel" id="phone" placeholder="05xxxxxxxx" autocomplete="tel" inputmode="tel" pattern="[0-9+]*"></div>
  </div>
  <div class="field"><label for="email">البريد الإلكتروني</label><input type="email" id="email" placeholder="you@example.com" autocomplete="email" inputmode="email" required></div>
  <div class="field"><label for="pass">كلمة المرور</label><input type="password" id="pass" placeholder="8 أحرف على الأقل" autocomplete="new-password" minlength="8" required><div class="pwd-hint">لأمان حسابك: استخدم كلمة لا تستخدمها في مواقع أخرى</div></div>
  <div class="field">
    <label for="btype">نوع النشاط</label>
    <select id="btype" autocomplete="off">
      <option value="">اختر...</option>
      <option value="restaurant">مطعم</option>
      <option value="cafe">كافيه</option>
      <option value="salon">صالون تجميل</option>
      <option value="clinic">عيادة</option>
      <option value="retail">متجر تجزئة</option>
      <option value="gym">نادي رياضي</option>
      <option value="hotel">فندق / شقق</option>
      <option value="other">أخرى</option>
    </select>
  </div>
  <button class="btn" id="btn" onclick="doSignup()">ابدأ تجربتي المجانية ←</button>
  <div style="display:flex;align-items:center;gap:10px;margin:14px 0;">
    <div style="flex:1;height:1px;background:#E2E8F0;"></div>
    <span style="font-size:11.5px;color:#94A3B8;white-space:nowrap;">أو سجّل بـ</span>
    <div style="flex:1;height:1px;background:#E2E8F0;"></div>
  </div>
  <button class="btn-google" id="btn-google" onclick="signupWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 48 48" style="flex-shrink:0"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    إنشاء حساب بـ Google
  </button>
  <div class="link">عندك حساب؟ <a href="/login.html">سجّل دخول</a></div>
  <div class="link" style="margin-top:8px;font-size:11.5px;color:#94A3B8;line-height:1.6">بإنشاء حساب فإنك توافق على <a href="/terms.html" style="color:#94A3B8;text-decoration:underline">الشروط</a> و<a href="/privacy.html" style="color:#94A3B8;text-decoration:underline">سياسة الخصوصية</a></div>
</div>
<script>
const sb = supabase.createClient('https://bxlvcdfqpkxyrqjdnchi.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4bHZjZGZxcGt4eXJxamRuY2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1Nzk1MTgsImV4cCI6MjA5MTE1NTUxOH0.sG1TRiia7E6DGAUHLNAakjiLRu3lopDfRNcMB-0kV3U');
sb.auth.getSession().then(function(r){if(r.data&&r.data.session)window.location.href='/dashboard.html';});

function isValidEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(e);}
function isValidSaudiPhone(p){if(!p)return true;var c=p.replace(/[\s-]/g,'');return /^(05|009665|\+9665)\d{8}$/.test(c);}

['name','phone','email','pass'].forEach(function(id){
  var el=document.getElementById(id);
  if(el)el.addEventListener('input',function(){this.classList.remove('invalid');document.getElementById('err').className='err';});
});

async function signupWithGoogle(){
  const btn=document.getElementById('btn-google');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner" style="border-top-color:#2251D3"></span> جاري التوجيه...';
  await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+'/dashboard.html'}});
}

async function doSignup(){
  var name=document.getElementById('name');
  var phone=document.getElementById('phone');
  var email=document.getElementById('email');
  var pass=document.getElementById('pass');
  var btype=document.getElementById('btype').value;
  var err=document.getElementById('err');
  var btn=document.getElementById('btn');
  err.className='err';
  [name,phone,email,pass].forEach(function(el){el.classList.remove('invalid');});

  if(!name.value.trim()){err.textContent='الاسم مطلوب';err.className='err show';name.classList.add('invalid');name.focus();return;}
  if(!email.value.trim()){err.textContent='البريد الإلكتروني مطلوب';err.className='err show';email.classList.add('invalid');email.focus();return;}
  if(!isValidEmail(email.value.trim())){err.textContent='صيغة البريد الإلكتروني غير صحيحة';err.className='err show';email.classList.add('invalid');email.focus();return;}
  if(phone.value.trim() && !isValidSaudiPhone(phone.value.trim())){err.textContent='رقم الواتساب غير صحيح. مثال: 05xxxxxxxx أو +9665xxxxxxxx';err.className='err show';phone.classList.add('invalid');phone.focus();return;}
  if(!pass.value){err.textContent='كلمة المرور مطلوبة';err.className='err show';pass.classList.add('invalid');pass.focus();return;}
  if(pass.value.length<8){err.textContent='كلمة المرور 8 أحرف على الأقل';err.className='err show';pass.classList.add('invalid');pass.focus();return;}

  btn.disabled=true;
  btn.innerHTML='جاري التسجيل... <span class="spinner"></span>';

  var result=await sb.auth.signUp({
    email:email.value.trim(),
    password:pass.value,
    options:{data:{full_name:name.value.trim(),phone:phone.value.trim(),business_type:btype}}
  });

  if(result.error){
    var msgs={
      'User already registered':'هذا الإيميل مسجّل — <a href="/login.html">سجّل دخول</a>',
      'Password should be at least 6 characters':'كلمة المرور قصيرة جداً'
    };
    err.innerHTML=msgs[result.error.message]||result.error.message;
    err.className='err show';
    btn.disabled=false;
    btn.textContent='ابدأ تجربتي المجانية ←';
    return;
  }
  if(result.data&&result.data.session){window.location.href='/dashboard.html';return;}
  err.textContent='تم إنشاء الحساب. إذا لم تدخل مباشرة، تحقق من بريدك الإلكتروني ثم سجّل الدخول.';
  err.className='err show';
  btn.disabled=false;
  btn.textContent='ابدأ تجربتي المجانية ←';
}

document.getElementById('pass').addEventListener('keydown',function(e){if(e.key==='Enter')doSignup();});
</script>
</body>
</html>
